<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TOEIC Mission Deck 200</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --sky-main: #0ea5e9; --sky-light: #e0f2fe; --accent: #0369a1; --text-main: #0f172a; --text-sub: #475569; --success: #22c55e; --gold: #f59e0b; --danger: #ef4444; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background: #f8fafc; color: var(--text-main); -webkit-user-select: none; }
        .header-container { position: sticky; top: 0; z-index: 1000; background: white; border-bottom: 2px solid var(--sky-main); padding: 15px 10px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .instrument-grid { display: flex; gap: 20px; align-items: center; max-width: 600px; margin: 0 auto 5px; }
        .gauge-container { width: 65px; height: 65px; border-radius: 50%; border: 4px solid var(--accent); position: relative; flex-shrink: 0; }
        .gauge-needle { position: absolute; bottom: 50%; left: 50%; width: 2px; height: 26px; background: var(--danger); transform-origin: bottom center; transition: 1s cubic-bezier(0.4, 0, 0.2, 1); }
        .stat-main { font-size: 1.4rem; font-weight: 900; color: var(--accent); }
        .total-progress-wrap { max-width: 600px; margin: 5px auto 15px; padding: 0 5px; }
        .main-progress-bg { height: 10px; background: #e2e8f0; border-radius: 5px; overflow: hidden; }
        .main-progress-bar { height: 100%; background: linear-gradient(90deg, var(--sky-main), var(--success)); width: 0%; transition: width 0.8s ease; }
        .nav-section { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }
        .btn-row { display: flex; gap: 6px; }
        .btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 800; font-size: 0.75rem; cursor: pointer; text-transform: uppercase; }
        .btn-main { background: var(--sky-light); color: var(--accent); }
        .btn-main.active { background: var(--sky-main); color: white; }
        .btn-toggle { background: var(--accent); color: white; }
        .btn-backup { background: #f1f5f9; color: var(--text-sub); border: 1px solid #e2e8f0; font-size: 0.65rem; }
        body.mode-hide-ja .ja { color: transparent; background: #f1f5f9; border-radius: 4px; }
        body.mode-hide-en .en { color: transparent; background: #e0f2fe; border-radius: 4px; }
        .ja:active, .en:active { color: inherit !important; background: transparent !important; }
        .list-container { padding: 10px 10px 120px; max-width: 600px; margin: 0 auto; }
        .word-card { background: white; border-radius: 14px; padding: 18px; margin-bottom: 12px; border: 1px solid #e2e8f0; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .id-badge { font-size: 0.7rem; font-weight: 900; color: #94a3b8; margin-bottom: 4px; display: block; font-family: monospace; }
        .en { font-size: 1.6rem; color: var(--accent); font-weight: 900; }
        .ja { font-size: 1rem; color: var(--text-sub); font-weight: bold; margin: 8px 0 12px; display: block; }
        .ex-box { font-size: 0.85rem; color: #64748b; background: #f8fafc; padding: 10px; border-radius: 8px; display: flex; gap: 8px; line-height: 1.4; }
        .voice-btn { background: none; border: none; color: var(--sky-main); cursor: pointer; padding: 5px; font-size: 1.1rem; }
        .btn-check { position: absolute; top: 12px; right: 12px; width: 44px; height: 44px; border-radius: 50%; border: 2px solid #e2e8f0; background: #fff; color: #cbd5e1; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
        .word-card.is-logged { opacity: 0.5; background: #f8fafc; }
        .word-card.is-logged .btn-check { background: var(--success); color: white; border-color: var(--success); }
    </style>
</head>
<body class="mode-hide-ja">

<div class="header-container">
    <div class="instrument-grid">
        <div class="gauge-container"><div id="needle" class="gauge-needle"></div></div>
        <div>
            <div style="font-size:0.75rem; font-weight:900; color:var(--gold);">MISSION PROGRESS</div>
            <div class="stat-main"><span id="percent-stat">0.0</span>% <small style="font-size:0.8rem; color:var(--text-sub);">/ <span id="mastered-count">0</span> words</small></div>
        </div>
    </div>
    <div class="total-progress-wrap">
        <div class="main-progress-bg"><div id="main-progress-bar" class="main-progress-bar"></div></div>
    </div>
    <div class="nav-section">
        <div class="btn-row">
            <button class="btn btn-main active" id="f-flying" onclick="setFilter('flying')">FLYING</button>
            <button class="btn btn-main" id="f-logged" onclick="setFilter('logged')">LOGGED</button>
        </div>
        <div class="btn-row">
            <button class="btn btn-toggle" id="mode-toggle-btn" onclick="rotateMode()">MODE: HIDE JA</button>
        </div>
        <div class="btn-row">
            <button class="btn btn-backup" onclick="exportData()"><i class="fa-solid fa-download"></i> EXPORT</button>
            <button class="btn btn-backup" onclick="importData()"><i class="fa-solid fa-upload"></i> IMPORT</button>
            <button class="btn btn-backup" style="color:var(--danger);" onclick="resetAll()"><i class="fa-solid fa-trash"></i> RESET</button>
        </div>
    </div>
</div>

<div class="list-container" id="main-list"></div>

<script src="data.js"></script>

<script>
    const GRAND_TOTAL = 1000;
    const modes = ['hide-ja', 'hide-en', 'all'];
    const modeLabels = {'hide-ja': 'MODE: HIDE JA', 'hide-en': 'MODE: HIDE EN', 'all': 'MODE: ALL VIEW'};
    let currentModeIdx = modes.indexOf(localStorage.getItem('viewMode') || 'hide-ja');
    let hiddenIds = new Set(JSON.parse(localStorage.getItem('loggedWords') || '[]'));
    let currentFilter = 'flying';

    let preferredVoice = null;
    function loadVoices() {
        const voices = window.speechSynthesis.getVoices();
        preferredVoice = voices.find(v => v.name.includes('Google') && v.lang === 'en-US') || 
                         voices.find(v => v.lang === 'en-US') || voices[0];
    }
    window.speechSynthesis.onvoiceschanged = loadVoices;
    loadVoices();

    function speak(text) {
        window.speechSynthesis.cancel();
        const uttr = new SpeechSynthesisUtterance(text);
        if (preferredVoice) uttr.voice = preferredVoice;
        uttr.rate = 0.9;
        window.speechSynthesis.speak(uttr);
    }

    function exportData() {
        const data = Array.from(hiddenIds).join(',');
        if(!data) { alert("記録が空です。"); return; }
        prompt("【復元コード】コピーして保存してください:", data);
    }

    function importData() {
        const input = prompt("【復元】コードを貼り付けてください:");
        if (input) {
            const ids = input.split(',').map(Number).filter(n => !isNaN(n) && n > 0);
            hiddenIds = new Set(ids);
            localStorage.setItem('loggedWords', JSON.stringify([...hiddenIds]));
            render();
            alert("データを復元しました！");
        }
    }

    function resetAll() {
        if(confirm("学習記録をすべて消去しますか？")) {
            hiddenIds.clear();
            localStorage.removeItem('loggedWords');
            render();
        }
    }

    function rotateMode() {
        currentModeIdx = (currentModeIdx + 1) % modes.length;
        updateModeUI();
    }

    function updateModeUI() {
        const newMode = modes[currentModeIdx];
        document.body.className = `mode-${newMode}`;
        document.getElementById('mode-toggle-btn').innerText = modeLabels[newMode];
        localStorage.setItem('viewMode', newMode);
    }

    function setFilter(f) {
        currentFilter = f;
        document.getElementById('f-flying').classList.toggle('active', f==='flying');
        document.getElementById('f-logged').classList.toggle('active', f==='logged');
        render();
    }

    function toggleHide(id) {
        if(hiddenIds.has(id)) hiddenIds.delete(id); else hiddenIds.add(id);
        localStorage.setItem('loggedWords', JSON.stringify([...hiddenIds]));
        render();
    }

    function render() {
        const list = document.getElementById('main-list');
        list.innerHTML = '';
        if (typeof vocabulary === 'undefined') {
            list.innerHTML = '<p style="color:red; text-align:center;">data.js が見つからないか、読み込めていません。</p>';
            return;
        }
        const filtered = vocabulary.filter(v => currentFilter === 'flying' ? !hiddenIds.has(v.id) : hiddenIds.has(v.id));
        
        filtered.forEach(v => {
            const card = document.createElement('div');
            card.className = `word-card ${hiddenIds.has(v.id) ? 'is-logged' : ''}`;
            card.innerHTML = `
                <span class="id-badge">ID: #${String(v.id).padStart(3, '0')}</span>
                <button class="btn-check" onclick="toggleHide(${v.id})"><i class="fa-solid fa-check"></i></button>
                <div class="word-header"><span class="en">${v.en}</span>
                    <button class="voice-btn" onclick="speak('${v.en}')"><i class="fa-solid fa-volume-high"></i></button>
                </div>
                <span class="ja">${v.ja}</span>
                <div class="ex-box">
                    <button class="voice-btn" onclick="event.stopPropagation(); speak('${v.ex.replace(/'/g, "\\'")}')"><i class="fa-solid fa-play"></i></button>
                    <span>${v.ex}</span>
                </div>
            `;
            list.appendChild(card);
        });

        const total = hiddenIds.size;
        const ratio = total / GRAND_TOTAL;
        document.getElementById('needle').style.transform = `rotate(${Math.min(ratio * 360, 360)}deg)`;
        document.getElementById('percent-stat').innerText = (ratio * 100).toFixed(1);
        document.getElementById('mastered-count').innerText = total;
        document.getElementById('main-progress-bar').style.width = `${Math.min(ratio*100, 100)}%`;
    }

    window.onload = () => { updateModeUI(); render(); };
</script>
</body>
</html>
